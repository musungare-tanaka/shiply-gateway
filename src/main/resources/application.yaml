spring:
  application:
    name: shiply-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Vary RETAIN_FIRST

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "https://shiply-frontend.vercel.app"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      routes:
        - id: user-management
          uri: ${USER_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/auth/**,/api/projects/**
          filters: []

server:
  port: 9091
