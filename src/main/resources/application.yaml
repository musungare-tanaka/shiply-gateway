spring:
  application:
    name: shiply-gateway

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Vary RETAIN_FIRST

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "https://shiply-frontend.vercel.app"
              - "http://localhost:3000"
              - "http://localhost:5173"
              - "http://localhost:4173"
              - "http://127.0.0.1:3000"
              - "http://127.0.0.1:5173"
              - "http://127.0.0.1:4173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      routes:
        - id: user-management
          uri: ${USER_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/auth/**,/api/projects/**,/api/users/**,/api/admin/**
          filters: []

server:
  port: 9091
