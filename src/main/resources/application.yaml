spring:
  application:
    name: shiply-gateway

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      routes:
        - id: user-management
          uri: ${USER_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/auth/**,/api/projects/**
          filters: []

server:
  port: 8087
